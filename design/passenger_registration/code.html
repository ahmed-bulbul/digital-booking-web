<body class="bg-background font-body text-on-background min-h-screen selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- TopAppBar -->
<header class="w-full top-0 left-0 sticky z-50 bg-[#f7f9ff] dark:bg-slate-950 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">

</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#dfe3e8] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">

</button>
<button class="p-2 rounded-full hover:bg-[#dfe3e8] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">

</button>
</div>
</header>
<main class="relative flex flex-col md:flex-row min-h-[calc(100vh-72px)] overflow-hidden">
<!-- Left Side: Editorial Content -->
<section class="hidden md:flex flex-1 relative flex-col justify-end p-12 overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="luxury coach bus interior with plush leather seats and panoramic windows overlooking a lush green forest landscape during sunrise" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJilncNd0i22YdUYaJhneOCVdC33rCE9LgsG5emADqG4FBI4cD437IhAEyutriUzMMLi4Anxpor5GtZl5HAYAlLAGyVDWeXvB9JeCmsAWk_Xz60_UaJ6zffdp2N_QFBqMuAJ8GOIloZS2wV-ev82ShXaJifO72VnL7qMBe7LKG3qjbK4pXRBUkxjnTvz2OlGwKJitPSogjQYbNJl9SlnLBIuax_TQ0ndiyNm-KpfXlsfBW_0K6VHE1-eDsbs1UoyOB56XR3XwyAQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-transparent to-transparent"></div>
</div>
<div class="relative z-10 max-w-lg">
<div class="inline-flex items-center px-3 py-1 rounded-full bg-surface-container-lowest/20 backdrop-blur-md border border-white/10 mb-6">
<span class="w-2 h-2 rounded-full bg-primary-fixed animate-pulse mr-2"></span>
<span class="text-white text-[10px] font-medium uppercase tracking-widest font-label">The Emerald Route Experience</span>
</div>
<h1 class="text-white font-headline font-bold text-5xl leading-tight mb-4 tracking-tight">Your peaceful journey begins here.</h1>
<p class="text-primary-fixed text-lg font-medium opacity-90 max-w-sm">Join the sanctuary of high-end mobility and rediscover the joy of travel.</p>
</div>
</section>
<!-- Right Side: Registration Form -->
<section class="flex-1 flex items-center justify-center p-6 md:p-12 lg:p-20 bg-surface">
<div class="w-full max-w-md">
<header class="mb-10">
<h2 class="font-headline font-extrabold text-3xl text-on-background tracking-tight mb-2">Create Account</h2>
<p class="text-on-surface-variant font-medium">Join our community of premium travelers.</p>
</header>
<form class="space-y-6">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant px-1 font-label">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="Johnathan Doe" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant px-1 font-label">Email Address</label>
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="john@sanctuary.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant px-1 font-label">Phone Number</label>
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant px-1 font-label">Create Password</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant px-1 font-label">Confirm Password</label>
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary h-4 w-4" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                            I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>, including the use of high-standard sanctuary protocols.
                        </label>
</div>
<button class="w-full primary-gradient text-white font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                        Create Account
                    </button>
<div class="pt-6 text-center">
<p class="text-on-surface-variant font-medium">
                            Already part of the sanctuary? 
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Login instead</a>
</p>
</div>
</form>
<!-- Editorial Social Proof -->
<div class="mt-12 pt-12 border-t border-outline-variant/10">
<div class="flex items-center gap-4 justify-center grayscale opacity-50">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant font-label">Trusted by over 50,000 travelers</span>
</div>
</div>
</div>

<div class="fixed top-1/4 -right-10 w-40 h-40 bg-primary-fixed/30 blur-[100px] pointer-events-none rounded-full"></div>
<div class="fixed bottom-1/4 -left-10 w-60 h-60 bg-secondary-fixed/20 blur-[120px] pointer-events-none rounded-full"></div>
